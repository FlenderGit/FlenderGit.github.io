<style>
    body {
        margin: 0;
        text-align: center;
        background-color: black;
    }
    canvas{
        width: 90%;
        height: 90%;
        border: 2px solid black;
        margin: 2%;
        background-color: beige;
    }
    table{
        border:1px solid black;
        position: absolute;
        bottom: 7% ;
        left: 7%;
    }
    h1{
        position: absolute;
        top: 4% ;
        left: 7%;
    }
</style>

<body>
    <h1>Boids Simulation</h1>
    <div>
        <canvas></canvas>
    </div>

    <div>
        <table >
            <tr>
                <td>Numbre of Boids</td>
                <td><input id="nbBoid" type="range" value="20" min="1" max="200" onchange="changeNbBoid(this.value)"></td>
            </tr>
            <tr>
                <td>Distance Flock</td>
                <td><input id="dFlock" type="range" value="300" min="200" max="400"></td>
            </tr>
            <tr>
                <td>Distance Align</td>
                <td><input id="dAlign" type="range" value="35" min="10" max="60"></td>
            </tr>
            <tr>
                <td>Numbre Avoid</td>
                <td><input id="dAvoid" type="range" value="20" min="1" max="40"></td>
            </tr>
        </table>
    </div>

</body>


<script src="boid.js"></script>
